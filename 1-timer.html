<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Timer</title>
      <script type="module" crossorigin src="/goit-advancedjs-hw-02/1-timer.js"></script>
      <link rel="modulepreload" crossorigin href="/goit-advancedjs-hw-02/assets/modulepreload-polyfill-B5Qt9EMX.js">
      <link rel="modulepreload" crossorigin href="/goit-advancedjs-hw-02/assets/vendor-Dov3POoy.js">
      <link rel="stylesheet" crossorigin href="/goit-advancedjs-hw-02/assets/styles-BLU78-GL.css">
    </head>
    <body>
        <header class="header">
            <div class="container">
                <nav class="nav">
                    <a
                        class="nav-logo"
                        href="./index.html"
                        aria-label="Site logo"
                    >
                        <svg class="nav-logo-icon" width="100" height="30">
                            <use href="/goit-advancedjs-hw-02/assets/sprite-C6bbaCzQ.svg#logo"></use>
                        </svg>
                    </a>
                    <ul class="nav-list">
                        <li class="nav-item">
                            <a class="nav-link" href="./1-timer.html">Timer</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./2-snackbar.html"
                                >Snackbar</a
                            >
                        </li>
                    </ul>
                </nav>
            </div>
        </header>
        <main>
            <div class="container">
                <a class="back-link" href="./index.html">Go back</a>

                <!-- #region Timer Markup-->
                <div class="wrapper">
                    <input type="text" id="datetime-picker" /><button
                        type="button"
                        data-start
                        disabled
                    >
                        Start
                    </button>
                    <div class="timer">
                        <div class="field">
                            <span class="value" data-days>00</span>
                            <span class="label">Days</span>
                        </div>
                        <div class="field">
                            <span class="value" data-hours>00</span>
                            <span class="label">Hours</span>
                        </div>
                        <div class="field">
                            <span class="value" data-minutes>00</span>
                            <span class="label">Minutes</span>
                        </div>
                        <div class="field">
                            <span class="value" data-seconds>00</span>
                            <span class="label">Seconds</span>
                        </div>
                    </div>
                </div>
                <!-- #endregion -->
            </div>
        </main>
    </body>
</html>
