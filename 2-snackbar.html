<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Snackbar</title>
      <script type="module" crossorigin src="/goit-advancedjs-hw-02/2-snackbar.js"></script>
      <link rel="modulepreload" crossorigin href="/goit-advancedjs-hw-02/assets/modulepreload-polyfill-B5Qt9EMX.js">
      <link rel="modulepreload" crossorigin href="/goit-advancedjs-hw-02/assets/vendor-Dov3POoy.js">
      <link rel="stylesheet" crossorigin href="/goit-advancedjs-hw-02/assets/styles-BLU78-GL.css">
    </head>
    <body>
        <header class="header">
            <div class="container">
                <nav class="nav">
                    <a
                        class="nav-logo"
                        href="./index.html"
                        aria-label="Site logo"
                    >
                        <svg class="nav-logo-icon" width="100" height="30">
                            <use href="/goit-advancedjs-hw-02/assets/sprite-C6bbaCzQ.svg#logo"></use>
                        </svg>
                    </a>
                    <ul class="nav-list">
                        <li class="nav-item">
                            <a class="nav-link" href="./1-timer.html">Timer</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./2-snackbar.html"
                                >Snackbar</a
                            >
                        </li>
                    </ul>
                </nav>
            </div>
        </header>
        <main>
            <div class="container">
                <h1 class="main-title">
                    <span class="main-title-gradient">Welcome</span> to Snackbar
                </h1>
                <a class="back-link" href="./index.html">Go back</a>
                <form class="form">
                    <label class="form-label">
                        Delay (ms)
                        <input
                            class="form-input"
                            type="number"
                            name="delay"
                            required
                        />
                    </label>

                    <fieldset class="form-fieldset">
                        <legend class="fieldset-legend">State</legend>
                        <div class="fieldset-wrapper">
                            <label class="fieldset-label">
                                <input
                                    class="fieldset-input"
                                    type="radio"
                                    name="state"
                                    value="fulfilled"
                                    required
                                />
                                Fulfilled
                            </label>
                            <label class="fieldset-label">
                                <input
                                    class="fieldset-input"
                                    type="radio"
                                    name="state"
                                    value="rejected"
                                    required
                                />
                                Rejected
                            </label>
                        </div>
                    </fieldset>

                    <button class="submit-button" type="submit">
                        Create notification
                    </button>
                </form>
            </div>
        </main>
    </body>
</html>
